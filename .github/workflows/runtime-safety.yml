name: Runtime Safety

on:
  push:
    branches:
      - main
    paths:
      - CMakeLists.txt
      - src/**
      - tests/**
      - .github/workflows/runtime-safety.yml
  pull_request:
    branches:
      - main
    paths:
      - CMakeLists.txt
      - src/**
      - tests/**
      - .github/workflows/runtime-safety.yml
  schedule:
    - cron: "43 04 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asan-ubsan:
    name: ASAN/UBSAN
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run ASAN/UBSAN validation
        run: bash tests/run-sanitizer-asan.sh

  tsan:
    name: TSAN
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run TSAN validation
        run: bash tests/run-sanitizer-tsan.sh

  valgrind:
    name: Valgrind
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends valgrind

      - name: Run Valgrind validation
        run: bash tests/run-valgrind.sh

  go-race:
    name: Go Race Detector
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: src/go/go.mod
          cache: false

      - name: Run Go race detector
        run: bash tests/run-go-race.sh
