name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 03 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.name }}
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: C/C++
            language: c-cpp
            build_mode: manual
            build_command: |
              cmake -S . -B build-codeql -DCMAKE_BUILD_TYPE=Debug
              cmake --build build-codeql --parallel --target netipc_protocol netipc_uds netipc_shm netipc_service
          - name: Go
            language: go
            build_mode: manual
            build_command: |
              for module in src/go tests/fixtures/go bench/drivers/go; do
                (cd "$module" && go test ./...)
              done
          - name: Rust
            language: rust
            build_mode: none
            build_command: ":"

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: src/go/go.mod
          cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build_mode }}
          config-file: ./.github/codeql.yml

      - name: Build for CodeQL
        if: matrix.build_mode == 'manual'
        run: ${{ matrix.build_command }}

      - name: Analyze
        uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          category: /language:${{ matrix.language }}
